# Daily posting schedule — ONE source of truth for BOTH backends:
#   * local  : ops/scheduler/gen-crontab.sh turns this into the supercronic crontab
#   * gcp    : gcp-scheduler.sh turns this into one Cloud Scheduler job per channel
# Which backend runs is the GCP_PROD_SCHEDULER flag in .env (disabled -> local).
#
# "One enabled channel = one scheduler entry" — each row below is one channel's
# daily run. A row for a DISABLED channel is harmless: daily.py --channel <c>
# finds no integration and no-ops, so you can pre-list a channel and just flip
# its *_ENABLED flag later.
#
# Per-channel budgets, spread through the day. Each fire posts only what is
# actually ready and stops early when the backlog is empty, so these rows are
# safe to leave running until everything is published. READY and OLDEST are
# always on for the daily run (drain the oldest ready-rendered backlog first).
#
# NOTE: `count` is PER FIRE — daily total = count x fires. Current policy:
# count=1 and FIVE fire times per channel, so each fire posts exactly one card
# and exits in seconds (no hours-long delay loop); daily total = 5/channel.
# `delay` only matters when count > 1.
#   LinkedIn — free (LinkedIn caps ~100/24h). 5 fires x 1 = 5/day.
#   X        — ~$0.20/post, hard-blocked once at 47/day. 5 fires x 1 = 5/day (~$1).
#
# Columns (pipe-separated, whitespace around cells ignored):
#   channel | count | delay | tier | cron (5-field: min hour dom mon dow)
# delay = spacing between cards within one fire; accepts 90 (seconds) or 60m/2h.
# cron times are in SCHEDULER_TZ (local) or GCP_SCHEDULER_TZ (gcp). Lines
# starting with # and blank lines are ignored.
#
# channel  | count | delay | tier             | cron
linkedin   | 1    | 90     | arboryx.robotics | 0 6,10,14,18,22 * * *
x          | 1    | 90     | arboryx.robotics | 30 8,11,14,17,20 * * *
